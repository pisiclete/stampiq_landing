<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StampIQ — Redirecting…</title>

    <!-- QR-code landing. The script below detects iOS/Android and sends the
         visitor straight to the right app store. Desktop visitors (or anyone
         the script can't classify) fall through to the marketing site. The
         meta-refresh + <noscript> below cover the JS-disabled case. -->
    <meta http-equiv="refresh" content="0; url=/">

    <style>
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #F9F9F9;
            color: #222222;
        }
        .redirect-message {
            text-align: center;
            padding: 20px;
        }
        a {
            color: #66E204;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="redirect-message">
        <p>Opening StampIQ…</p>
        <p><a href="/">Continue to the website</a></p>
    </div>

    <script>
        (function () {
            var ua = navigator.userAgent || '';
            var APP_STORE  = 'https://apps.apple.com/app/id6760778035';
            var PLAY_STORE = 'https://play.google.com/store/apps/details?id=io.stampiq.app';
            var WEBSITE    = '/';

            var target;
            if (/iPad|iPhone|iPod/.test(ua)) {
                target = APP_STORE;
            } else if (/android/i.test(ua)) {
                target = PLAY_STORE;
            } else {
                target = WEBSITE;
            }
            location.replace(target);
        })();
    </script>
</body>
</html>
